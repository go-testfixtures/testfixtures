version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: monthly
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /dbtests
    schedule:
      interval: monthly
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /cmd/testfixtures
    schedule:
      interval: monthly
    groups:
      all:
        patterns:
          - "*"
